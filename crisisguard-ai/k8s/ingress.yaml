# ═══════════════════════════════════════════════════════════
#  CrisisGuard AI — Ingress (GKE + Cloud Load Balancer)
# ═══════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crisisguard-ingress
  namespace: crisisguard
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "crisisguard-ip"
    networking.gke.io/managed-certificates: "crisisguard-cert"
    networking.gke.io/v1beta1.FrontendConfig: "crisisguard-frontend"
spec:
  rules:
    - host: api.crisisguard.io
      http:
        paths:
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
          - path: /ws/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: websocket-service
                port:
                  number: 80
    - host: ai.crisisguard.io
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: ai-gateway
                port:
                  number: 80
    - host: admin.crisisguard.io
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: admin-dashboard
                port:
                  number: 80
---
# ═══════════════════════════════════════════════════════════
#  Frontend Config (HTTPS redirect)
# ═══════════════════════════════════════════════════════════
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: crisisguard-frontend
  namespace: crisisguard
spec:
  redirectToHttps:
    enabled: true
    responseCodeName: MOVED_PERMANENTLY_DEFAULT
---
# ═══════════════════════════════════════════════════════════
#  Managed Certificate (Google-managed SSL)
# ═══════════════════════════════════════════════════════════
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: crisisguard-cert
  namespace: crisisguard
spec:
  domains:
    - api.crisisguard.io
    - ai.crisisguard.io
    - admin.crisisguard.io
---
# ═══════════════════════════════════════════════════════════
#  ConfigMap — Non-sensitive configuration
# ═══════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: crisisguard-config
  namespace: crisisguard
data:
  NODE_ENV: "production"
  API_PORT: "3000"
  WS_PORT: "3003"
  CORS_ORIGIN: "https://admin.crisisguard.io"
  REDIS_URL: "redis://redis-service:6379"
  GEMINI_MODEL: "gemini-2.0-flash"
  AI_GATEWAY_URL: "http://ai-gateway"
  EVACUATION_ENGINE_URL: "http://evacuation-engine"
  EMERGENCY_GATEWAY_URL: "http://emergency-gateway"
---
# ═══════════════════════════════════════════════════════════
#  HPA — Horizontal Pod Autoscaler for API Gateway
# ═══════════════════════════════════════════════════════════
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: crisisguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# ═══════════════════════════════════════════════════════════
#  HPA — AI Gateway (higher baseline due to inference load)
# ═══════════════════════════════════════════════════════════
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-gateway-hpa
  namespace: crisisguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-gateway
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
