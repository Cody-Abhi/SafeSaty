kind: Deployment
metadata:
  name: ai-gateway
  namespace: crisisguard
  labels:
    app: ai-gateway
    tier: ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-gateway
  template:
    metadata:
      labels:
        app: ai-gateway
        tier: ai
    spec:
      containers:
        - name: ai-gateway
          image: gcr.io/PROJECT_ID/crisisguard-ai-gateway:latest
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: crisisguard-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway
  namespace: crisisguard
spec:
  selector:
    app: ai-gateway
  ports:
    - port: 80
      targetPort: 8001
  type: ClusterIP
